name: github actions

on: # control the workflows
  workflow_dispatch: # run manaully
  schedule: # run schedule
    - cron: '0 */6 * * *'

jobs: # workflows
  build: # job name - build
    runs-on: ubuntu-latest # type of runner

    steps: # steps
    - uses: actions/checkout@main
    - uses: actions/checkout@v3
    - name: Use Node.js # steps name
      uses: actions/setup-node@v1
      with:
        node-version: '16.x'
    - name: Update README.md
      run: node index.js > README.md
    - name: Commit change & Push
      run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "bot: update README.md automatically"
          git push
